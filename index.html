<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>WordGame - Memoria de Palabras</title>
    <base href="/" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        gamePrimary: '#6C63FF',
                        gameSecondary: '#FF6584',
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS -->
    <link href="css/game.css" rel="stylesheet" />
    <link href="WordGame.styles.css" rel="stylesheet" />
</head>

<body class="bg-[#0B0C10] text-[#C5C6C7] font-sans antialiased min-h-screen relative z-0">
    <div class="fixed inset-0 z-[-1] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-[#1f2833] via-[#0B0C10] to-[#0B0C10] opacity-80"></div>
    <div id="app">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-[#66FCF1] text-2xl font-light tracking-widest animate-pulse">Cargando Juego...</div>
        </div>
    </div>

    <div id="blazor-error-ui" class="hidden fixed bottom-0 w-full bg-red-600 text-white p-4 justify-between z-50">
        Se produjo un error no controlado.
        <a href="" class="underline font-bold ml-4">Recargar</a>
        <a class="cursor-pointer font-bold ml-4" onclick="document.getElementById('blazor-error-ui').classList.add('hidden')">✕</a>
    </div>
    
    <!-- Sounds interop -->
    <script>
        window.audioHelper = {
            playAudio: function (audioSrc) {
                const audio = new Audio(audioSrc);
                audio.play().catch(e => console.log('Audio playback prevented by browser policy: ' + e));
            }
        };
        window.focusElement = function (element) {
            if (element) {
                element.focus();
            }
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
